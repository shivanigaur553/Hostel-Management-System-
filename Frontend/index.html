<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GEHU Hostel — Portal</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--off);
        padding: 24px;
      }
      .portal-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        box-shadow: var(--shadow-lg);
        width: 100%;
        max-width: 440px;
        overflow: hidden;
        animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .portal-head {
        padding: 36px 36px 28px;
        text-align: center;
        border-bottom: 1px solid var(--border);
      }
      .portal-head .mark {
        width: 52px;
        height: 52px;
        background: var(--ink);
        border-radius: var(--r-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        margin: 0 auto 18px;
      }
      .portal-head h1 {
        font-size: 1.6rem;
        color: var(--ink);
        margin-bottom: 6px;
      }
      .portal-head p {
        font-size: 0.82rem;
        color: var(--ink3);
        line-height: 1.6;
      }
      .portal-body {
        padding: 24px;
        display: grid;
        gap: 12px;
      }
      .portal-btn {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 18px 20px;
        border: 1.5px solid var(--border);
        border-radius: var(--r);
        text-decoration: none;
        color: var(--ink);
        transition: all 0.18s;
        background: var(--white);
      }
      .portal-btn:hover {
        border-color: var(--ink2);
        background: var(--off);
        transform: translateY(-2px);
        box-shadow: var(--shadow);
      }
      .portal-btn .p-icon {
        width: 42px;
        height: 42px;
        background: var(--off);
        border-radius: var(--r-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .portal-btn .p-text strong {
        display: block;
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 2px;
      }
      .portal-btn .p-text span {
        font-size: 0.78rem;
        color: var(--ink3);
      }
      .portal-btn .arrow {
        margin-left: auto;
        color: var(--ink3);
        font-size: 1rem;
      }
      .portal-foot {
        text-align: center;
        padding: 16px;
        border-top: 1px solid var(--border);
        font-size: 0.75rem;
        color: var(--ink3);
      }
    </style>
  </head>
  <body>
    <div class="portal-card">
      <div class="portal-head">
        <div class="mark">🏛️</div>
        <h1 class="serif">GEHU Hostel</h1>
        <p>
          Graphic Era Hill University · Dehradun<br />Hostel Management Portal
        </p>
      </div>
      <div class="portal-body">
        <a href="student/login.html" class="portal-btn">
          <div class="p-icon">🎓</div>
          <div class="p-text">
            <strong>Student Portal</strong>
            <span>View rooms, check availability & fees</span>
          </div>
          <span class="arrow">→</span>
        </a>
        <a href="admin/login.html" class="portal-btn">
          <div class="p-icon">⚙️</div>
          <div class="p-text">
            <strong>Admin Panel</strong>
            <span>Manage rooms, students & allocations</span>
          </div>
          <span class="arrow">→</span>
        </a>
      </div>
      <div class="portal-foot">GEHU Hostel Management System · 2024–25</div>
    </div>
  </body>
</html>
